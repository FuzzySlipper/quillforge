<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Quill Forge</title>
    <script type="module" crossorigin src="/assets/index-ZmLX6R2g.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B0MlUOAy.css">
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script>
      // Persistent version badge — survives React re-renders via fixed positioning
      fetch('/api/status').then(r=>r.json()).then(d=>{
        if(!d.version)return;
        const badge=document.createElement('div');
        badge.id='qf-version-badge';
        badge.style.cssText='position:fixed;bottom:4px;left:8px;font-size:10px;opacity:0.4;z-index:9999;color:inherit;pointer-events:none;font-family:monospace;';
        badge.textContent='v'+d.version+(d.build&&d.build!==d.version?' ('+d.build.split('+')[1]+')':'');
        document.body.appendChild(badge);
      }).catch(()=>{});
    </script>
  </body>
</html>
